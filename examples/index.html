<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>CHIP-8 Emulator</title>
		<style>
			body {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
				margin: 0;
				background: #1a1a2e;
				color: #eee;
				font-family: monospace;
			}
			.emulators {
				display: flex;
				gap: 40px;
				flex-wrap: wrap;
				justify-content: center;
			}
			.emulator {
				display: flex;
				flex-direction: column;
				align-items: center;
			}
			canvas {
				border: 4px solid #444;
				image-rendering: pixelated;
			}
			.controls {
				margin-top: 20px;
				text-align: center;
			}
			button {
				padding: 10px 20px;
				font-size: 16px;
				cursor: pointer;
				background: #4a4a6a;
				color: #fff;
				border: none;
				border-radius: 4px;
				margin: 5px;
			}
			button:hover {
				background: #5a5a7a;
			}
		</style>
	</head>
	<body>
		<h1>CHIP-8 Emulator</h1>
		<div class="emulators">
			<div class="emulator">
				<h2>Audio Input</h2>
				<canvas id="canvas1" width="640" height="320"></canvas>
				<div class="controls">
					<button onclick="runAudioInput()">Compile & Run</button>
				</div>
			</div>
			<div class="emulator">
				<h2>Hello World</h2>
				<canvas id="canvas2" width="640" height="320"></canvas>
				<div class="controls">
					<button onclick="runHelloWorld()">Compile & Run</button>
				</div>
			</div>
		</div>
		<script src="wasm_exec.js"></script>
		<script>
			const go = new Go();
			WebAssembly.instantiateStreaming(
				fetch("main.wasm"),
				go.importObject,
			).then((result) => {
				go.run(result.instance);
			});

			async function runAudioInput() {
				const canvas = document.getElementById("canvas1");
				const vm = new CHIP8(canvas, 500);

				const response = await fetch("audio_input.asm");
				const asmCode = await response.text();
				console.log(asmCode);
				const romData = CHIP8.compile(asmCode);
				console.log(romData);

				vm.loadROM(romData);
				vm.run();
			}

			async function runHelloWorld() {
				const canvas = document.getElementById("canvas2");
				const vm = new CHIP8(canvas, 500);

				const responses = await Promise.all([
					fetch("hello_world.asm"),
					fetch("hello_world_sprites.asm"),
				]);
				const asmCode = (
					await Promise.all(responses.map((response) => response.text()))
				).join("\n");
				const romData = CHIP8.compile(asmCode);

				vm.loadROM(romData);
				vm.run();
			}
		</script>
	</body>
</html>
