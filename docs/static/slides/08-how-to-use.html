<section data-auto-animate data-background-image="assets/usage.png">
	<h2>How to Use</h2>
	<ul>
		<li class="fragment">
			<strong>Run a ROM:</strong>
			<pre><code class="language-bash">./chip-8 run &lt;path-to-rom&gt;</code></pre>
		</li>
		<li class="fragment">
			<strong>Assemble files:</strong>
			<pre><code class="language-bash">./chip-8 assemble &lt;path-to-asm1&gt; &lt;path-to-asm2&gt; ...</code></pre>
		</li>
		<li class="fragment">
			<strong>Specify output path:</strong>
			<pre><code class="language-bash">./chip-8 assemble -o output.ch8 &lt;file.asm&gt;</code></pre>
		</li>
	</ul>
</section>
