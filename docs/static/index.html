<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>

		<title>CHIP-8 Emulator</title>

		<link rel="stylesheet" href="reveal.js/reset.css" />
		<link rel="stylesheet" href="reveal.js/reveal.css" />
		<link rel="stylesheet" href="reveal.js/theme/black.css" />

		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/base16/colors.min.css"
		/>
	</head>
	<body>
		<div class="reveal">
			<div class="slides"></div>
		</div>

		<script src="reveal.js/reveal.js"></script>
		<script src="reveal.js/plugin/highlight.js"></script>
		<script data-last-script>
			(async function () {
				const go = new Go();
				const result = await WebAssembly.instantiateStreaming(
					fetch("assets/main.wasm"),
					go.importObject,
				);
				go.run(result.instance);
				await Promise.all([cycleBackground(), setupSnakeGame()]);

				Reveal.initialize({
					hash: true,
					keyboard: true,
					controls: false,
					plugins: [RevealHighlight],
					loading: "lazy",
				});
			})();
		</script>
	</body>
</html>
